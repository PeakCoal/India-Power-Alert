name: India Non-Fossil Power Alert (Real-Time)

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes — matches MERIT India's update cadence
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests pandas twilio
          playwright install chromium
          playwright install-deps chromium

      - name: Run real-time alert
        env:
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          WHATSAPP_FROM:       ${{ secrets.WHATSAPP_FROM }}
          WHATSAPP_TO:         ${{ secrets.WHATSAPP_TO }}
        run: python alert_realtime.py

      - name: Commit state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update last_alert.json [skip ci]"
          file_pattern: last_alert.json
