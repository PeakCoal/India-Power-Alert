name: India Non-Fossil Power Alert

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run alert
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python alert_realtime.py

      - name: Commit state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update last_alert.json [skip ci]"
          file_pattern: last_alert.json
